name: Daily Dashboard Update

on:
  schedule:
    - cron: '0 22 * * *'  # 毎日 22:00 UTC = 翌朝 7:00 JST
  workflow_dispatch:       # 手動実行ボタンも有効化

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run dashboard update
        env:
          SKIP_GIT_PUSH: "true"
        run: python main.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/ index.html
          git diff --staged --quiet || git commit -m "update dashboard $(date +%Y-%m-%d)"
          git push
